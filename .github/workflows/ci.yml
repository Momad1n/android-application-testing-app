name: .NET CI/CD Pipeline

on:
  push:
    branches:[ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '9.0.x' # Укажи свою версию .NET (например, 8.0 или 9.0)

    - name: Restore dependencies
      run: dotnet restore

    - name: Build project (with Static Analysis)
      # Сборка проекта. Если есть критические ошибки анализаторов, она упадет
      run: dotnet build --no-restore -c Release

    - name: Run Tests & Collect Coverage
      # Запуск тестов с Coverlet. Требует, чтобы в тестовом проекте был пакет coverlet.collector
      run: dotnet test --no-build -c Release --verbosity normal /p:CollectCoverage=true /p:CoverletOutputFormat=cobertura /p:Threshold=70
      
    - name: Upload Coverage Artifact
      uses: actions/upload-artifact@v3
      with:
        name: code-coverage-report
        path: '**/coverage.cobertura.xml'