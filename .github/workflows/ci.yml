name: .NET CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build project (with Static Analysis)
      run: dotnet build --no-restore -c Release

    - name: Run Tests & Collect Coverage
      # Если тестов пока нет или они падают, можно временно убрать /p:Threshold=70
      run: dotnet test --no-build -c Release --verbosity normal /p:CollectCoverage=true /p:CoverletOutputFormat=cobertura
      
    - name: Upload Coverage Artifact
      uses: actions/upload-artifact@v3
      with:
        name: code-coverage-report
        path: '**/coverage.cobertura.xml'