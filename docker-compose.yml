version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: aata_postgres
    environment:
      POSTGRES_DB: aata
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: